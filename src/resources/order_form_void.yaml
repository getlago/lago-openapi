parameters:
  - name: id
    in: path
    description: Unique identifier of the order form, created by Lago.
    required: true
    schema:
      type: string
      format: "uuid"
      example: "1a901a90-1a90-1a90-1a90-1a901a901a90"
post:
  tags:
    - order_forms
  summary: Void an order form
  description: This endpoint is used to void an order form. It requires the order forms feature to be enabled for the organization.
  operationId: voidOrderForm
  responses:
    "200":
      description: Order form voided
      content:
        application/json:
          schema:
            $ref: "../schemas/OrderForm.yaml"
    "401":
      $ref: "../responses/Unauthorized.yaml"
    "403":
      $ref: "../responses/Forbidden.yaml"
    "404":
      $ref: "../responses/NotFound.yaml"
    "422":
      $ref: "../responses/UnprocessableEntity.yaml"
