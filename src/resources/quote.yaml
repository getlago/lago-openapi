parameters:
  - name: id
    in: path
    description: Unique identifier of the quote, created by Lago.
    required: true
    schema:
      type: string
      format: "uuid"
      example: "1a901a90-1a90-1a90-1a90-1a901a901a90"
get:
  tags:
    - quotes
  summary: Retrieve a quote
  description: This endpoint is used to retrieve a specific quote, including its current version and owners. It requires the order forms feature to be enabled for the organization.
  operationId: findQuote
  responses:
    "200":
      description: Quote
      content:
        application/json:
          schema:
            $ref: "../schemas/Quote.yaml"
    "401":
      $ref: "../responses/Unauthorized.yaml"
    "403":
      $ref: "../responses/Forbidden.yaml"
    "404":
      $ref: "../responses/NotFound.yaml"
