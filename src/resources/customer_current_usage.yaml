get:
  tags:
    - customers
  summary: Retrieve customer current usage
  description: This endpoint enables the retrieval of the usage-based billing data for a customer within the current period.
  parameters:
    - name: external_customer_id
      in: path
      description: The customer external unique identifier (provided by your own application).
      required: true
      schema:
        type: string
        example: '5eb02857-a71e-4ea2-bcf9-57d3a41bc6ba'
    - name: external_subscription_id
      in: query
      description: The unique identifier of the subscription within your application.
      required: true
      explode: true
      schema:
        type: string
        example: 'sub_1234567890'
    - name: apply_taxes
      in: query
      description: >
        Optional flag to determine if taxes should be applied.
        Defaults to `true` if not provided or if null.
      required: false
      schema:
        type: boolean
        default: true
        example: true
    - name: filter_by_charge_id
      in: query
      description: Filter usage to a specific charge by its Lago ID (UUID).
      required: false
      schema:
        type: string
        format: uuid
        example: '1a901a90-1a90-1a90-1a90-1a901a901a90'
    - name: filter_by_charge_code
      in: query
      description: Filter usage to a specific charge by its code.
      required: false
      schema:
        type: string
        example: 'storage'
    - name: filter_by_group
      in: query
      description: >
        Filter usage by pricing group. Pass key/value pairs as query parameters,
        e.g. `filter_by_group[cloud]=aws`.
      required: false
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
        example:
          cloud: 'aws'
    - name: full_usage
      in: query
      description: >
        When `true`, returns usage since subscription start instead of the current billing period.
        Requires either `filter_by_charge_id`, `filter_by_charge_code`, or `filter_by_group` to be set.
      required: false
      schema:
        type: boolean
        default: false
        example: true
    - name: filter_by_presentation[]
      in: query
      description: >
        Filter `presentation_breakdowns` by a list of presentation group key values.
        Only breakdowns matching the provided values will be returned.
        Pass an empty array to disable `presentation_breakdowns` entirely.
      required: false
      explode: true
      schema:
        type: array
        items:
          type: string
        example:
          - engineering
          - operations
  operationId: findCustomerCurrentUsage
  responses:
    '200':
      description: Customer usage
      content:
        application/json:
          schema:
            $ref: '../schemas/CustomerUsage.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '404':
      $ref: '../responses/NotFound.yaml'
