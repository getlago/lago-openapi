allOf:
  - $ref: "./ChargeProperties.yaml"
  - type: object
    properties:
      presentation_group_keys:
        type: array
        description: Groups usage into sub-items on invoices for display only, without affecting pricing or aggregation.
        items:
          type: object
          properties:
            value:
              type: string
              description: The event property to group by.
              example: region
            options:
              type: object
              properties:
                display_in_invoice:
                  type: boolean
                  example: true
        example:
          - value: region
            options:
              display_in_invoice: true
