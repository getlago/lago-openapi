type: object
required:
  - subscription
properties:
  status:
    type: string
    enum:
      - active
      - pending
    example: active
    description: If the field is not defined and multiple `active` and `pending` subscriptions exists, Lago will update the `active` subscription. However, if you wish to update a `pending` subscription, please ensure that you include the `status` attribute with the `pending` value in your request body.
  subscription:
    type: object
    required:
      - ending_at
    properties:
      name:
        type:
          - string
          - "null"
        example: "Repository B"
        description: The display name of the subscription on an invoice. This field allows for customization of the subscription's name for billing purposes, especially useful when a single customer has multiple subscriptions using the same plan.
      ending_at:
        type:
          - string
          - "null"
        format: "date-time"
        example: "2022-10-08T00:00:00Z"
        description: The effective end date of the subscription. If this field is set to null, the subscription will automatically renew. This date should be provided in ISO 8601 datetime format, and use Coordinated Universal Time (UTC).
      subscription_at:
        type: string
        format: "date-time"
        example: "2022-08-08T00:00:00Z"
        description: The start date and time of the subscription. This field can only be modified for pending subscriptions that have not yet started. This date should be provided in ISO 8601 datetime format and expressed in Coordinated Universal Time (UTC).
      plan_overrides:
        $ref: "../schemas/PlanOverridesObject.yaml"
        description: Overrides applied to the plan for this subscription. A units-only `fixed_charges` override is recorded as a per-subscription unit override without creating a plan override; any other override creates a plan override for the subscription. See `fixed_charges` for the exact rule.
      invoice_custom_section:
        $ref: "./InvoiceCustomSectionInput.yaml"
      payment_method:
        $ref: "./PaymentMethodReference.yaml"
        description: Optional payment method to use for processing subscription payments.
      consolidate_invoice:
        type: boolean
        example: false
        description: |
          Defines whether this subscription should be grouped with other subscriptions of the same customer when generating recurring invoices.

          - `true`: the subscription is included in the customer's standard invoice grouping (by billing entity, currency and payment method).
          - `false`: the subscription is excluded from consolidation and always billed on its own dedicated invoice.
      billing_entity_code:
        type: string
        example: "default"
        description: The code of the billing entity associated with the subscription. Updates take effect on future invoices only.
